<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send Alert - AccessAble</title>

<link rel="stylesheet" href="../css/alert.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="alert-container">

<!-- Sidebar -->

<div class="sidebar">

<h2>AccessAble ♿</h2>

<ul>

<li onclick="goPage('dashboard.html')">🏠 Dashboard</li>

<li class="active">🔔 Send Alert</li>

<li onclick="goPage('sos.html')">🚨 SOS Emergency</li>

<li onclick="goPage('profile.html')">👤 Profile</li>

<li onclick="logout()">🚪 Logout</li>

</ul>

</div>


<!-- Main Content -->

<div class="main-content">

<h1>Bus Stop Assistance Alert</h1>

<div class="alert-form-box">

<form id="alertForm">

<label>Bus Stop Name</label>
<input type="text" id="busStop" placeholder="Enter bus stop name" required>

<label>Bus Number</label>
<input type="text" id="busNumber" placeholder="Enter bus number" required>

<label>Type of Assistance</label>

<select id="assistanceType" required>

<option value="">Select Assistance</option>

<option>Wheelchair Boarding Help</option>

<option>Ramp Needed</option>

<option>Seat Assistance</option>

</select>

<label>Additional Notes</label>

<textarea id="notes" placeholder="Optional notes"></textarea>

<button type="submit">Send Alert</button>

</form>

</div>

</div>

</div>


<script>

function goPage(page){
window.location.href = page;
}

function logout(){
localStorage.clear();
window.location.href = "login.html";
}

document.getElementById("alertForm").addEventListener("submit",function(e){

e.preventDefault();

const busStop = document.getElementById("busStop").value;
const busNumber = document.getElementById("busNumber").value;
const assistance = document.getElementById("assistanceType").value;
const notes = document.getElementById("notes").value;

const userEmail = localStorage.getItem("loggedUser");

let alerts = JSON.parse(localStorage.getItem("alerts")) || [];

const newAlert = {

user:userEmail,
busStop:busStop,
busNumber:busNumber,
assistance:assistance,
notes:notes,
time:new Date().toLocaleString()

};

alerts.push(newAlert);

localStorage.setItem("alerts",JSON.stringify(alerts));

alert("Alert Sent Successfully!");

document.getElementById("alertForm").reset();

});

</script>

</body>
</html>
