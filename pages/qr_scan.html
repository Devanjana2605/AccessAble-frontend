<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scan</title>

  <link rel="stylesheet" href="../css/qr_scan.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- QR scanner library -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

  <style>
    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
      text-align: left;
      display: none;
    }

    .result-box h3 {
      margin-bottom: 12px;
      color: #065f46;
    }

    .result-box ul {
      padding-left: 20px;
      margin-top: 10px;
    }

    .result-box li {
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .status-msg {
      margin-top: 14px;
      font-weight: 500;
      color: #1d4ed8;
    }

    .error-msg {
      margin-top: 14px;
      font-weight: 500;
      color: #dc2626;
    }

    #previewImage {
      max-width: 250px;
      margin-top: 15px;
      border-radius: 10px;
      display: none;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>AccessAble ♿</h2>

      <ul>
        <li onclick="goPage('user_dashboard.html')">🏠 Dashboard</li>
        <li class="active">📷 QR Scan</li>
        <li onclick="goPage('profile.html')">👤 Profile</li>
      </ul>
    </div>

    <!-- QR Section -->
    <div class="qr-section">
      <h1>Scan Accessibility QR</h1>

      <div class="qr-card">
        <p>Upload a QR code placed at accessible locations.</p>

        <input type="file" id="qrInput" accept="image/*" />
        <button onclick="scanQR()">Scan QR</button>

        <img id="previewImage" alt="QR Preview" />

        <div id="result" class="status-msg"></div>

        <div id="resultBox" class="result-box">
          <h3 id="placeName"></h3>
          <ul id="infoList"></ul>
          <p class="status-msg">Redirecting to reviews page...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function goPage(page) {
      window.location.href = page;
    }

    function getIcon(text) {
      const lower = text.toLowerCase();

      if (lower.includes("lift")) return "🛗";
      if (lower.includes("stairs")) return "⚠️";
      if (lower.includes("warning")) return "⚠️";
      if (lower.includes("wet floor")) return "⚠️";
      if (lower.includes("unavailable")) return "🚫";
      if (lower.includes("ramp")) return "♿";
      if (lower.includes("accessible")) return "♿";

      return "📍";
    }

    async function scanQR() {
      const input = document.getElementById("qrInput");
      const result = document.getElementById("result");
      const resultBox = document.getElementById("resultBox");
      const placeName = document.getElementById("placeName");
      const infoList = document.getElementById("infoList");
      const previewImage = document.getElementById("previewImage");

      result.className = "status-msg";
      result.innerHTML = "";
      resultBox.style.display = "none";
      infoList.innerHTML = "";

      if (!input.files || !input.files[0]) {
        result.className = "error-msg";
        result.innerHTML = "Please upload a QR image first.";
        return;
      }

      const file = input.files[0];
      const imageUrl = URL.createObjectURL(file);
      previewImage.src = imageUrl;
      previewImage.style.display = "block";

      const img = new Image();
      img.src = imageUrl;

      img.onload = function () {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (!code) {
          result.className = "error-msg";
          result.innerHTML = "QR code not detected. Please upload a clear QR image.";
          return;
        }

        try {
          const qrData = JSON.parse(code.data);

          if (!qrData.place || !qrData.info || !Array.isArray(qrData.info)) {
            throw new Error("Invalid QR format");
          }

          placeName.innerHTML = `📍 Place: ${qrData.place}`;
          infoList.innerHTML = "";

          qrData.info.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = `${getIcon(item)} ${item}`;
            infoList.appendChild(li);
          });

          result.innerHTML = "QR scanned successfully.";
          resultBox.style.display = "block";

          // pass place name to reviews page
          const encodedPlace = encodeURIComponent(qrData.place);

          setTimeout(() => {
            window.location.href = `reviews.html?place=${encodedPlace}`;
          }, 5000);

        } catch (error) {
          result.className = "error-msg";
          result.innerHTML =
            "QR scanned, but the data format is invalid. Please use the correct JSON-based QR.";
        }
      };

      img.onerror = function () {
        result.className = "error-msg";
        result.innerHTML = "Unable to read the uploaded image.";
      };
    }
  </script>
</body>
</html>
