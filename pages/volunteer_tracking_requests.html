<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Tracking Requests</title>

<link rel="stylesheet" href="../css/volunteer_tracking_requests.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.request-list{
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}
.request-card{
  background: white;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #d1fae5;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
.request-card p{
  margin-bottom: 8px;
  color: #14532d;
  font-size: 14px;
}
.badge{
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  text-transform: capitalize;
}
.badge.pending{ background: #FEF3C7; color: #92400E; }
.badge.accepted{ background: #DCFCE7; color: #166534; }
.badge.rejected{ background: #FEE2E2; color: #991B1B; }
.badge.ended{ background: #E5E7EB; color: #374151; }
.btn-group{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}
.accept-btn,.reject-btn{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:600;
}
.accept-btn{ background:#16a34a; }
.accept-btn:hover{ background:#15803d; }
.reject-btn{ background:#dc2626; }
.reject-btn:hover{ background:#b91c1c; }
#status{
  margin-top: 20px;
  font-weight: 600;
}
</style>
</head>

<body>
<div class="container">
  <div class="sidebar">
    <h2>AccessAble ♿</h2>
    <ul>
      <li onclick="goPage('volunteer_dashboard.html')">🏠 Dashboard</li>
      <li onclick="goPage('volunteer_profile.html')">🤝 Fill Volunteer Details</li>
      <li onclick="goPage('vol_request.html')">📩 Check Requests</li>
      <li class="active">📍 Tracking Requests</li>
      <li onclick="goPage('profile.html')">👤 Profile</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <div class="main">
    <h1>Volunteer Tracking Requests</h1>
    <div id="trackingRequestList" class="request-list"></div>
    <p id="status"></p>
  </div>
</div>

<script>
const supabaseUrl = "https://skerqyzfgultmwixcnzu.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrZXJxeXpmZ3VsdG13aXhjbnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDkyNjgsImV4cCI6MjA4ODgyNTI2OH0.i2KddciOYeSqKKJWppvWsMREnB4uPdSBX9H1DlrbFWU";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let currentVolunteerId = null;
let locationInterval = null;
let trackingChannel = null;
let isInitializing = false;
let authListenerAttached = false;

function goPage(p){
  window.location.href = p;
}
window.goPage = goPage;

async function logout(){
  try{
    await supabaseClient.auth.signOut();
  }catch(e){
    console.error("Logout error:", e);
  } finally {
    stopLocationSharing();
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "login.html";
  }
}
window.logout = logout;

function setStatus(message, isError = false){
  const status = document.getElementById("status");
  status.innerText = message;
  status.style.color = isError ? "red" : "green";
}

function getBadgeClass(status){
  if(status === "accepted") return "accepted";
  if(status === "rejected") return "rejected";
  if(status === "ended") return "ended";
  return "pending";
}

function escapeHtml(value){
  if(value === null || value === undefined) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

async function getCurrentUser(){
  const { data, error } = await supabaseClient.auth.getUser();

  if(error){
    console.error("getUser error:", error);
    return null;
  }

  return data.user || null;
}

async function upsertVolunteerLocation(volunteerUserId, lat, lon){
  try{
    const { data: existing, error: fetchError } = await supabaseClient
      .from("volunteer_locations")
      .select("*")
      .eq("volunteer_user_id", volunteerUserId)
      .maybeSingle();

    if(fetchError){
      console.error("Location fetch error:", fetchError);
      return;
    }

    if(existing){
      const { error: updateError } = await supabaseClient
        .from("volunteer_locations")
        .update({
          latitude: String(lat),
          longitude: String(lon),
          updated_at: new Date().toISOString()
        })
        .eq("volunteer_user_id", volunteerUserId);

      if(updateError){
        console.error("Location update error:", updateError);
      }
    } else {
      const { error: insertError } = await supabaseClient
        .from("volunteer_locations")
        .insert([{
          volunteer_user_id: volunteerUserId,
          latitude: String(lat),
          longitude: String(lon),
          updated_at: new Date().toISOString()
        }]);

      if(insertError){
        console.error("Location insert error:", insertError);
      }
    }
  } catch(err){
    console.error("upsertVolunteerLocation error:", err);
  }
}

function stopLocationSharing(){
  if(locationInterval){
    clearInterval(locationInterval);
    locationInterval = null;
    console.log("Location sharing stopped");
  }
}

function sendCurrentLocationOnce(volunteerUserId){
  if(!navigator.geolocation){
    setStatus("Location not supported on this device", true);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      console.log("Sending one-time location:", position.coords.latitude, position.coords.longitude);
      await upsertVolunteerLocation(volunteerUserId, position.coords.latitude, position.coords.longitude);
    },
    (error) => {
      console.error("Geolocation error:", error);
      setStatus("Unable to get live location", true);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

function startLocationSharing(volunteerUserId){
  if(locationInterval){
    return;
  }

  if(!navigator.geolocation){
    setStatus("Location not supported on this device", true);
    return;
  }

  sendCurrentLocationOnce(volunteerUserId);

  locationInterval = setInterval(() => {
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        console.log("Sending live location:", position.coords.latitude, position.coords.longitude);
        await upsertVolunteerLocation(volunteerUserId, position.coords.latitude, position.coords.longitude);
      },
      (error) => {
        console.error("Geolocation error:", error);
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }, 10000);

  console.log("Location sharing started");
}

async function checkAcceptedTrackingAndShare(volunteerUserId){
  try{
    const { data, error } = await supabaseClient
      .from("volunteer_tracking_requests")
      .select("*")
      .eq("volunteer_user_id", volunteerUserId)
      .eq("status", "accepted");

    console.log("Accepted tracking rows:", data);
    console.log("Accepted tracking error:", error);

    if(error){
      console.error("Accepted tracking check error:", error);
      return;
    }

    if(data && data.length > 0){
      startLocationSharing(volunteerUserId);
    } else {
      stopLocationSharing();
    }
  } catch(err){
    console.error("checkAcceptedTrackingAndShare error:", err);
  }
}

async function loadTrackingRequests(volunteerUserId){
  const list = document.getElementById("trackingRequestList");
  list.innerHTML = "<p>Loading tracking requests...</p>";

  try{
    console.log("Loading tracking requests for volunteer:", volunteerUserId);

    const { data, error } = await supabaseClient
      .from("volunteer_tracking_requests")
      .select("*")
      .eq("volunteer_user_id", volunteerUserId)
      .order("created_at", { ascending: false });

    console.log("Tracking requests data:", data);
    console.log("Tracking requests error:", error);

    list.innerHTML = "";

    if(error){
      throw error;
    }

    if(!data || data.length === 0){
      list.innerHTML = "<p>No tracking requests available.</p>";
      stopLocationSharing();
      return;
    }

    data.forEach(req => {
      list.innerHTML += `
        <div class="request-card">
          <p><strong>Volunteer Name:</strong> ${escapeHtml(req.volunteer_name || "Volunteer")}</p>
          <p><strong>Bystander User ID:</strong> ${escapeHtml(req.bystander_user_id)}</p>
          <p><strong>Status:</strong> <span class="badge ${getBadgeClass(req.status)}">${escapeHtml(req.status)}</span></p>

          ${
            req.status === "pending"
            ? `
              <div class="btn-group">
                <button class="accept-btn" onclick="updateTrackingStatus('${req.id}', 'accepted')">Accept</button>
                <button class="reject-btn" onclick="updateTrackingStatus('${req.id}', 'rejected')">Reject</button>
              </div>
            `
            : ""
          }

          ${req.status === "accepted" ? `<p style="margin-top:10px; color:#166534; font-weight:600;">Live location sharing active</p>` : ""}
          ${req.status === "rejected" ? `<p style="margin-top:10px; color:#991B1B; font-weight:600;">Tracking request rejected</p>` : ""}
          ${req.status === "ended" ? `<p style="margin-top:10px; color:#374151; font-weight:600;">Tracking ended</p>` : ""}
        </div>
      `;
    });

    await checkAcceptedTrackingAndShare(volunteerUserId);
  } catch(err){
    console.error("loadTrackingRequests error:", err);
    list.innerHTML = "<p>Could not load tracking requests.</p>";
    setStatus("Could not load tracking requests", true);
    stopLocationSharing();
  }
}

async function updateTrackingStatus(requestId, newStatus){
  try{
    const { error } = await supabaseClient
      .from("volunteer_tracking_requests")
      .update({
        status: newStatus,
        updated_at: new Date().toISOString()
      })
      .eq("id", requestId)
      .eq("volunteer_user_id", currentVolunteerId);

    if(error) throw error;

    if(newStatus === "accepted"){
      setStatus("Tracking request accepted. Live location sharing started.");
    } else if(newStatus === "rejected"){
      setStatus("Tracking request rejected successfully");
    } else {
      setStatus("Tracking request updated successfully");
    }

    await loadTrackingRequests(currentVolunteerId);
  } catch(err){
    console.error("updateTrackingStatus error:", err);
    setStatus("Failed to update tracking request", true);
  }
}
window.updateTrackingStatus = updateTrackingStatus;

function removeOldChannel(){
  if(trackingChannel){
    supabaseClient.removeChannel(trackingChannel);
    trackingChannel = null;
  }
}

function subscribeRealtime(){
  if(!currentVolunteerId) return;

  removeOldChannel();

  trackingChannel = supabaseClient
    .channel("volunteer-tracking-requests")
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "volunteer_tracking_requests",
        filter: `volunteer_user_id=eq.${currentVolunteerId}`
      },
      async () => {
        console.log("Tracking request realtime update");
        await loadTrackingRequests(currentVolunteerId);
      }
    )
    .subscribe((status) => {
      console.log("Volunteer tracking channel status:", status);
    });
}
/* ================= REALTIME LOCATION UPDATES ================= */

let locationChannel = null;

function subscribeLocationRealtime() {
  if (!currentVolunteerId) return;

  if (locationChannel) {
    supabaseClient.removeChannel(locationChannel);
  }

  locationChannel = supabaseClient
    .channel("volunteer-location-live")
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "volunteer_locations",
        filter: `volunteer_user_id=eq.${currentVolunteerId}`
      },
      async (payload) => {
        console.log("Location realtime update:", payload);

        // Optional: reload tracking UI
        await loadTrackingRequests(currentVolunteerId);
      }
    )
    .subscribe((status) => {
      console.log("Location channel status:", status);
    });
}
function attachAuthListenerOnce(){
  if(authListenerAttached) return;
  authListenerAttached = true;

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if(event === "SIGNED_OUT" || !session){
      stopLocationSharing();
      window.location.href = "login.html";
    }
  });
}

async function initializePage(){
  if(isInitializing) return;
  isInitializing = true;

  try{
    const user = await getCurrentUser();

    if(!user){
      window.location.href = "login.html";
      return;
    }

    currentVolunteerId = user.id;
    console.log("Logged in volunteer for tracking page:", currentVolunteerId);

    setStatus("Loading tracking requests...");
    await loadTrackingRequests(currentVolunteerId);
    subscribeRealtime();
    subscribeLocationRealtime();
    setStatus("Tracking requests loaded successfully");
  } catch(err){
    console.error("initializePage error:", err);
    setStatus("Failed to initialize tracking page", true);
  } finally {
    isInitializing = false;
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  attachAuthListenerOnce();
  await initializePage();
});
</script>
</body>
</html>
